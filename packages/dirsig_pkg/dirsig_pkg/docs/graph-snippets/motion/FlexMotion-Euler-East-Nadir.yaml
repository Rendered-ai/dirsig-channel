nodes:
  EulerOrientationEngine_3:
    color: '#99D2D2'
    hash: 06ed99c415fd30395ba3945f4bfbb0050566dcd0
    links:
      Orientation(s):
        - outputPort: Entry
          sourceNode: TimeEntry_11
    location:
      x: 2355.6024477415667
      'y': 876.2013307458976
    name: EulerOrientationEngine_3
    nodeClass: EulerOrientationEngine
    ports:
      inputs:
        - description: >-
            One or more TimeEntries where each represents a time dependent
            orientation.
          name: Orientation(s)
          validation:
            numLinks: oneOrMany
        - default: xyz
          description: Controls the order of how objects are rotated.
          name: Rotation Order
          select:
            - xyz
            - xzy
            - yxz
            - yzx
            - zxy
            - zyx
          value: xyz
        - default: scene
          description: >-
            scene for East-North-Up coordinates, geodetic for Lat-Lon-Alt
            coordinate, ecef for Earth-Centered-Earth-Fixed coordinates.
          name: Frame
          select:
            - scene
            - geodetic
            - ecef
          value: scene
      outputs:
        - description: A complete OrientationEngine object.
          name: OrientationEngine
    tooltip: >-
      Allows the user to specify orientation using Euler angles as a function fo
      time.
    values:
      Frame: scene
      Rotation Order: xyz
  FlexMotion_4:
    color: '#99D2D2'
    hash: 1397f7f8b92d6ff02567a744ee72b467fe8821e2
    links:
      LocationEngine:
        - outputPort: LocationEngine
          sourceNode: WaypointLocationEngine_13
      OrientationEngine:
        - outputPort: OrientationEngine
          sourceNode: EulerOrientationEngine_3
    location:
      x: 2939.505781693892
      'y': 842.5964299982244
    name: FlexMotion_4
    nodeClass: FlexMotion
    ports:
      inputs:
        - description: >-
            Any location engine will work. If none are provided then the sensor
            will be placed at the origin.
          name: LocationEngine
          validation:
            numLinks: zeroOrOne
        - description: >-
            Any orientation engine will work. If none are provided then the
            sensor will "look at" the origin.
          name: OrientationEngine
          validation:
            numLinks: zeroOrOne
      outputs:
        - description: A complete FlexMotion object
          name: Motion
    tooltip: Controls the position and orientation of an object in the scene.
    values: {}
  TimeEntry_10:
    color: '#99D2D2'
    hash: 384cd1d034b6d0e9fb4b96f0b1efd8fc09e0564e
    links: {}
    location:
      x: 1878.794278231534
      'y': 649.5370427911932
    name: TimeEntry_10
    nodeClass: TimeEntry
    ports:
      inputs:
        - default: '0.0'
          description: Realtive time (seconds) from beginning of simulation.
          name: Time
          validation:
            oneOf:
              - type: number
              - numLinks: one
          value: '0.05'
        - default: '[0.0,0.0,0.0]'
          description: >-
            Location (meters) relative to the origin, or rotation angles
            (degrees).
          name: Entry
          validation:
            oneOf:
              - items:
                  type: number
                maxItems: 3
                minItems: 3
                type: array
              - numLinks: one
          value: '[200,0,300000]'
      outputs:
        - description: A timestamped entry.
          name: Entry
    tooltip: Specifies an entry at one time step.
    values:
      Entry: '[200,0,300000]'
      Time: '0.05'
