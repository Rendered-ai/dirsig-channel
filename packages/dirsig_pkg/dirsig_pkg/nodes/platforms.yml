schemas:
  WorldView3:
    alias: Medium Resolution EO Platform
    category: Platforms
    subcategory: Sensors
    tooltip: WorldView 3 VIS+NIR
    help: dirsig_pkg/platforms/WorldView3.md
    color: "#D4BF88"
    inputs:
    - name: Collect Intersection
      default: T
      select: [T, F]
      validation:
        type: string
    - name: Collect Geolocation
      default: F
      select: [T, F]
      validation:
        type: string
    - name: Flex Motion
      validation:
        numLinks: one
    - name: File Schedule
      default: simulation
      select: [simulation, capture, task]
    - name: Detector Clock Rate (Hz)
      default: "30.0"
      validation:
        type: float
    outputs:
    - name: Sensor
    
