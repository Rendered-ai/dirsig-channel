  CustomRGBSensor:
    category: Platforms
    subcategory: Sensors
    tooltip: A simple RGB sensor you can customize.
    help: dirsig_pkg/platforms/CustomRGBSensor.md
    color: "#D4BF88"
    inputs:
    - name: Truth Bands
      default: "GeoLocation,Intersection"
      description: Comma-separated list of truth bands to collect (e.g., GeoLocation,Intersection,Material,Shadow,Temperature)
      validation:
        type: string
    - name: Pixels
      default: "[320,240]"
      description: Number of pixels in x-dim and y-dim
      validation:
        oneOf:
          - type: array
            items:
              type: integer
              minimum: 1
            minItems: 2
            maxItems: 2
          - numLinks: one
    - name: Pixel Pitch
      default: "[10,10]"
      description: Size and spacing of pixels in x-dim and y-dim (microns)
      validation:
        oneOf:
          - type: array
            items:
              type: float
              minimum: 0.001
            minItems: 2
            maxItems: 2
          - numLinks: one
    - name: Focal Length
      default: "30.0"
      description: Focal length of sensor (millimeters)
      validation:
        oneOf:
          - type: float
            minimum: 0.00001
          - numLinks: one
    - name: Mount Orientation
      default: "Down"
      description: Sensor mount orientation. Downward or forward-looking.
      select:
      - "Down"
      - "Forward"
      validation:
        type: string
    - name: Detector Clock Rate (Hz)
      default: "60.0"
      description: Frame rate of the detector in Hz
      validation:
        type: float
        minimum: 0.0001
    - name: File Schedule
      default: simulation
      select: [simulation, capture, task]
    - name: Flex Motion
      validation:
        numLinks: one
    outputs:
    - name: Sensor

  ThermalSensor:
    alias: Thermal Sensor
    category: Platforms
    subcategory: Sensors
    tooltip: Thermal sensor
    help: dirsig_pkg/platforms/ThermalSensor.md
    color: "#D4BF88"
    inputs:
    - name: Band Limits
      default: "[8, 14]"
      description: Band limits in microns
      validation:
        array:
          items:
            type: float
            minimum: 0.00001
          minItems: 2
          maxItems: 2
    - name: Pixels
      default: "[320,240]"
      description: Number of pixels in x-dim and y-dim
      validation:
        array:
          items:
            type: integer
            minimum: 1
          minItems: 2
          maxItems: 2
    - name: Pixel Pitch
      default: "10"
      description: Size and spacing of pixels in x-dim and y-dim (microns)
      validation:
        float:
          minimum: 0.001
    - name: Focal Length
      default: "30.0"
      description: Focal length of sensor (millimeters)
      validation:
        float:
            minimum: 0.00001
    - name: Shutter Speed (s)
      default: "0.02"
      description: Shutter speed of sensor (seconds)
      validation:
        float:
            minimum: 0.0
    - name: MTF PSF Blur (pixels)
      default: "0"
      description: MTF PSF blur in pixels
      validation:
        float:
            minimum: 0.0
    - name: Mount Orientation
      default: "Down"
      description: Sensor mount orientation. Downward or forward-looking.
      select:
      - "Down"
      - "Forward"
      validation:
        type: string
    - name: Flex Motion
      validation:
        numLinks: one
    - name: Collect Location
      default: T
      select: [T, F]
      validation:
        type: string
    - name: Collect Material
      default: T
      select: [T, F]
      validation:
        type: string
    - name: Collect Temperature
      default: T
      select: [T, F]
      validation:
        type: string
    - name: Detector Clock Rate (Hz)
      default: "30.0"
      validation:
        type: float
    - name: File Schedule
      default: simulation
      select: [simulation, capture, task]
    outputs:
    - name: Sensor

  ElectroOptical:
    alias: Electro-optical
    category: Platforms
    subcategory: Sensors
    tooltip: Electro-optical PAN-only sensor derived from Altum-PT.
    help: dirsig_pkg/platforms/ElectroOptical.md
    color: '#D4BF88'
    inputs:
    - name: Resolution
      default: "[2064, 1544]"
      description: Number of pixels in x-dim and y-dim
      validation:
        array:
          items:
            type: integer
            minimum: 1
          minItems: 2
          maxItems: 2
    - name: Override Focal Length (mm)
      default: "0.0"
      description: Override focal length (mm). Use 0.0 for default (8.2 mm).
      validation:
        type: float
        minimum: 0.0
    - name: Mount Orientation
      default: "Down"
      description: Sensor mount orientation. Downward or forward-looking.
      select:
      - "Down"
      - "Forward"
      validation:
        type: string
    - name: Collect Truth
      default: "True"
      description: Enable truth mask collection (Intersection).
      select:
      - "True"
      - "False"
    - name: Flex Motion
      validation:
        numLinks: one
    - name: Detector Clock Rate (Hz)
      default: "30.0"
      validation:
        type: float
    - name: File Schedule
      default: simulation
      select: [simulation, capture, task]
    outputs:
    - name: Sensor
  
  AltumPT:
    alias: Altum-PT
    category: Platforms
    subcategory: Sensors
    tooltip: Altum-PT 6-band MSI+PAN. MicaSense Camera for 5.28 cm MSI; 2.49 cm Pan GSD at 120 m.
    help: dirsig_pkg/platforms/AltumPT.md
    color: '#D4BF88'
    inputs:
    - name: Resolution
      default: "[2064, 1544]"
      description: Number of pixels in x-dim and y-dim
      validation:
        array:
          items:
            type: integer
            minimum: 1
          minItems: 2
          maxItems: 2
    - name: RGB Only
      default: "False"
      select:
      - "True"
      - "False"
    - name: Add PAN
      default: "False"
      select:
      - "True"
      - "False"
    - name: Override Focal Length (mm)
      default: "0.0"
      description: Override focal length for MSI bands (mm). PAN will be double this value. Use 0.0 for defaults (8.0 mm MSI, 16.4 mm PAN).
      validation:
        type: float
        minimum: 0.0
    - name: Mount Orientation
      default: "Down"
      description: Sensor mount orientation. Downward or forward-looking.
      select:
      - "Down"
      - "Forward"
      validation:
        type: string
    - name: Flex Motion
      validation:
        numLinks: one
    - name: Detector Clock Rate (Hz)
      default: "30.0"
      validation:
        type: float
    - name: File Schedule
      default: simulation
      select: [simulation, capture, task]
    outputs:
    - name: Sensor
