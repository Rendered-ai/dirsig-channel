schemas:
  DynamizeObjects:
    tooltip: Set an object's dynamic location and orientation
    help: dirsig_pkg/instance_modifiers/dynamize_objects.md
    category: Scenes
    subcategory: Object Modifiers
    color: '#3A4928'
    inputs:
    - name: Objects
      description: One or more objects to make dynamic
      validation:
        numLinks: oneOrMany
    - name: Flex Motion
      validation:
        numLinks: one
    outputs:
    - name: Objects
      description: Dynamized input objects
  
  PoseObjects:
    tooltip: Explicitly set an object's location and orientation
    help: dirsig_pkg/instance_modifiers/pose_objects.md
    category: Scenes
    subcategory: Object Modifiers
    color: '#3A4928'
    inputs:
    - name: Objects
      description: One or more objects to modify
      validation:
        numLinks: oneOrMany
    - name: Translation (m)
      description: Additive factors to move the object
      default: "[0.0, 0.0, 0.0]"
    - name: Rotation (deg)
      description: Additive factors to rotate the object
      default: "[0.0, 0.0, 0.0]"
    - name: Match Slope
      description: Rotate the object to match the slope of the terrain; overrides the Rotation setting
      default: "False"
      select:
      - "True"
      - "False"
    - name: Match Elevation
      description: Raise the object to match the elevation of the terrain; overrides the Translation setting
      default: "False"
      select:
      - "True"
      - "False"
    outputs:
    - name: Objects
      description: Objects with updated position
    