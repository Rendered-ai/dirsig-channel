nodes:
  B737:
    nodeClass: B737
    links: {}
    values: {}

  DIRSIG5:
    nodeClass: DIRSIG5
    links:
      Scene:
        - outputPort: Scene
          sourceNode: Urban
      Sensor:
        - outputPort: Sensor
          sourceNode: High Resolution EO Platform
    values:
      Capture Duration (s): '1.0'
      Ephemeris: Simple Solar Ephemeris
      Reference Datetime: 2023-06-03T12:30

  DynamizeObjects:
    nodeClass: DynamizeObjects
    links:
      Flex Motion:
        - outputPort: Motion
          sourceNode: AircraftFlexMotion
      Objects:
        - outputPort: B737 Object
          sourceNode: B737
    values: {}

  FixedLocationEngine:
    nodeClass: FixedLocationEngine
    links: {}
    values:
      Frame: scene
      Position: '[0,0,0]'

  SensorFlexMotion:
    nodeClass: FlexMotion
    links:
      LocationEngine:
        - outputPort: LocationEngine
          sourceNode: SensorWaypointLocation
      OrientationEngine:
        - outputPort: OrientationEngine
          sourceNode: LookAtOrientationEngine
    values: {}

  AircraftFlexMotion:
    nodeClass: FlexMotion
    links:
      LocationEngine:
        - outputPort: LocationEngine
          sourceNode: AircraftWaypointLocation
      OrientationEngine:
        - outputPort: OrientationEngine
          sourceNode: VelocityOrientationEngine
    values: {}

  High Resolution EO Platform:
    nodeClass: High Resolution EO Platform
    links:
      Flex Motion:
        - outputPort: Motion
          sourceNode: SensorFlexMotion
    values:
      Collect Geolocation: F
      Collect Intersection: F
      Detector Clock Rate (Hz): '5.0'
      File Schedule: capture

  LookAtOrientationEngine:
    nodeClass: LookAtOrientationEngine
    links:
      LocationEngine:
        - outputPort: LocationEngine
          sourceNode: FixedLocationEngine
    values:
      Up Vector: '[0.0,0.0,1.0]'

  SensorPosition:
    nodeClass: TimeEntry
    links: {}
    values:
      Entry: '[0,0,100000]'
      Time: 0

  AircraftPosition1:
    nodeClass: TimeEntry
    links: {}
    values:
      Entry: '[-100,0,5000]'
      Time: '-0.1'

  AircraftPosition2:
    nodeClass: TimeEntry
    links: {}
    values:
      Entry: '[+100,0,5000]'
      Time: '2.0'

  Urban:
    nodeClass: Urban
    links:
      Objects:
        - outputPort: Objects
          sourceNode: DynamizeObjects
    values: {}

  VelocityOrientationEngine:
    nodeClass: VelocityOrientationEngine
    links: {}
    values:
      Frame: scene

  SensorWaypointLocation:
    nodeClass: WaypointLocationEngine
    links:
      Position(s):
        - outputPort: Entry
          sourceNode: SensorPosition
    values:
      Frame: scene

  AircraftWaypointLocation:
    nodeClass: WaypointLocationEngine
    links:
      Position(s):
        - outputPort: Entry
          sourceNode: AircraftPosition1
        - outputPort: Entry
          sourceNode: AircraftPosition2
    values:
      Frame: scene

version: 2
