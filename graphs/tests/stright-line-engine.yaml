                minItems: 3
                type: array
              - numLinks: one
      outputs:
        - description: A complete OrientationEngine object.
          name: OrientationEngine
    tooltip: >-
      Allows the user to focus on a specific point or object in the scene
      without specifying rotation angles.
    values:
      Up Vector: '[0.0,0.0,1.0]'
