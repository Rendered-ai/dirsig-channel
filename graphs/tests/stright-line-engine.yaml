  StraightLineLocationEngine_19:
    color: '#99D2D2'
    hash: 1a57c5adc5e657a40d6cedcc278a8915778caf1b
    links: {}
    location:
      x: 1193.645594457998
      'y': 884.2683516804466
    name: StraightLineLocationEngine_19
    nodeClass: StraightLineLocationEngine
    ports:
      inputs:
        - default: '[0.0,0.0,0.0]'
          description: Starting location (meters) relative to the origin.
          name: Position
          validation:
            oneOf:
              - items:
                  type: number
                maxItems: 3
                minItems: 3
                type: array
              - numLinks: one
        - default: '10.0'
          description: Rate at which to move (meters/second).
          name: Speed
          validation:
            oneOf:
              - minimum: 0
                type: number
              - numLinks: one
        - default: '0.0'
          description: Direction in which to move (degrees).
          name: Heading
          validation:
            oneOf:
              - type: number
              - numLinks: one
        - default: scene
          description: >-
            scene for East-North-Up coordinates, geodetic for Lat-Lon-Alt
            coordinate, ecef for Earth-Centered-Earth-Fixed coordinates.
          name: Frame
          select:
            - scene
            - geodetic
            - ecef
      outputs:
        - description: A complete LocationEngine object.
          name: LocationEngine
    tooltip: >-
      Defines an object moving in a straight line (constant altitude, constant
      speed).
    values:
      Frame: scene
      Heading: '0.0'
      Position: '[-150,-175,0.0]'
      Speed: '7500.0'
